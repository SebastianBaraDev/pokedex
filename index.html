<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="icon" href="./assets/icons/favicon.png">

    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/font.css">
    <link rel="stylesheet" href="./styles/pokemonTemplate.css">
    
    <script src="./script.js" defer></script>
    <script src="./scripts/getPokemonTemplate.js"></script>
    <script src="./scripts/dialog_templates.js"></script>
</head>
<body onload="init()" id="hide_scrollbar">

    <nav>
        <div class="wrapper flex_nav">
            <div class="header_logo">
              <img src="./assets/img/pokeball.png">
              <h1>Pokedex</h1>
            </div>
          <input type="text" id="search_input" placeholder="Search Pokemon..." minlength="3" oninput="searchPkm()">
        </div>
    </nav>

    <main>
        <div class="wrapper" id="content"></div>
        <button onclick="bulkLoadNextPokemon()" class="btn bg_blue" id="loadMoreBtn">Load more</button>
    </main>

    <dialog id="pokemon_card">
        <div id="dialog_background">
                
        <header class="DialogHeader">
            <h2 id="dialog_title"></h2>
            <img src="./assets/icons/close.png" class="DialogExit" onclick="closeDialog()" onkeydown="tabindexCloseDialog(event)">
        </header>

        <section class="bg">
            <div id="pkm_picture"><!-- Render Pkm img here--></div>
        </section>

        <section class="card_menu">
            <button class="dialog_btn" onclick="renderPkmCardInfos('main', currentIndex)">Main</button>
            <button class="dialog_btn" onclick="renderPkmCardInfos('stats', currentIndex)">Stats</button>
            <button class="dialog_btn" onclick="renderPkmCardInfos('evo', currentIndex)">Evo-Chain</button>
        </section>

        <section id="card_content">
            <!-- Render Pkm Infos here-->
        </section>

        <div class="DialogNav">
            <img src="./assets/img/left_arrow.svg" onclick="navBackward()" onkeydown="tabindexNavLeft(event)">
            <img src="./assets/img/right_arrow.svg" onclick="navForward()" onkeydown="tabindexNavRight(event)">
        </div>

        </div>
    </dialog>

    <footer>
        <div class="flex_footer">
            <img src="./assets/img/footer_logo.svg" class="FooterLogo">
            <p class="FooterFont">&copy; 2023 Developer Akademie GmbH</p>
        </div>
    </footer>
    
</body>
</html>
