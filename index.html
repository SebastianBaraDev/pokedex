<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="icon" href="./assets/icons/favicon.png">

    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/pokemonTemplate.css">
    
    <script src="./script.js"></script>
    <script src="./scripts/getPokemonTemplate.js"></script>
</head>
<body onload="init()">

    <nav>
        <div class="wrapper flex_nav">
            <div class="header_logo">
              <img src="./assets/img/pokeball.png">
              <h1>Pokedex</h1>
            </div>
          <input type="text">
        </div>
    </nav>

    <main>
        <div class="wrapper" id="content"></div>
        <button onclick="bulkLoadNextPokemon()" class="btn bg_blue">Load more</button>
    </main>

    <dialog id="pokemon_card">
        <div class="header">
            <h1>#ID   NAME</h1>
            <img src="./assets/icons/close.png" onclick="closeDialog()" style="cursor: pointer;">
        </div>

        <div class="bg">
            <img src="" class="dialog_img">
        </div>

        <div class="dialog_content">
        </div>

    </dialog>

    <footer>
        <div class="flex_footer">
            <img src="./assets/img/pokeball.png">
            <p>Developer Akademie</p>
        </div>
        <p class="text_centered">© 2026 Developer Akademie GmbH</p>
    </footer>
    
</body>
</html>
